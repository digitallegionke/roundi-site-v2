<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embeddable Blog Section</title>
  <style>
    /* Reset and base styles */
    .roundi-blog-embed * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .roundi-blog-embed {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .roundi-blog-header {
      text-align: left;
      margin-bottom: 3rem;
    }

    .roundi-blog-title {
      font-size: 2.5rem;
      font-weight: bold;
      color: #1a1a1a;
      margin-bottom: 0.5rem;
    }

    .roundi-blog-subtitle {
      font-size: 1.125rem;
      color: #666;
    }

    .roundi-blog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .roundi-blog-card {
      background: #fafafa;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.3s ease-in-out;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }

    .roundi-blog-card:hover {
      transform: translateY(-4px);
    }

    .roundi-blog-card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .roundi-blog-card-content {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .roundi-blog-card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      color: #666;
    }

    .roundi-blog-card-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 0.75rem;
      line-height: 1.4;
    }

    .roundi-blog-card-excerpt {
      font-size: 0.95rem;
      color: #666;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .roundi-blog-card-author {
      margin-top: auto;
      padding-top: 1rem;
    }

    .roundi-blog-card-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .roundi-blog-card-author-info {
      display: flex;
      flex-direction: column;
    }

    .roundi-blog-card-author-name {
      font-size: 0.875rem;
      font-weight: 500;
      color: #1a1a1a;
    }

    .roundi-blog-card-author-title {
      font-size: 0.75rem;
      color: #999;
    }

    .roundi-blog-loading {
      text-align: center;
      padding: 3rem;
      color: #666;
    }

    .roundi-blog-error {
      text-align: center;
      padding: 3rem;
      color: #dc2626;
    }

    @media (max-width: 1024px) {
      .roundi-blog-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .roundi-blog-title {
        font-size: 2rem;
      }

      .roundi-blog-grid {
        grid-template-columns: 1fr;
      }

      .roundi-blog-header {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="roundi-blog-embed" id="roundi-blog-container">
    <div class="roundi-blog-header">
      <h2 class="roundi-blog-title">Latest from our blog</h2>
      <p class="roundi-blog-subtitle">Insights, stories, and updates</p>
    </div>
    <div class="roundi-blog-loading">Loading blog posts...</div>
  </div>

  <script>
    (function() {
      // Configuration - Update these values
      const API_URL = 'https://v0-embeddable-blog-section.vercel.app/api/blog'; // Replace with your actual API URL
      const BLOG_BASE_URL = 'https://v0-embeddable-blog-section.vercel.app/blog'; // Replace with your blog URL
      const MAX_POSTS = 6; // Number of posts to display

      // Format date function
      function formatDate(dateString) {
        const date = new Date(dateString);
        const day = date.getDate();
        const suffix = getDaySuffix(day);
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const month = months[date.getMonth()];
        const year = date.getFullYear();
        return `${day}${suffix} ${month} ${year}`;
      }

      function getDaySuffix(day) {
        if (day >= 11 && day <= 13) return 'th';
        switch (day % 10) {
          case 1: return 'st';
          case 2: return 'nd';
          case 3: return 'rd';
          default: return 'th';
        }
      }

      // Fetch and render blog posts
      async function loadBlogPosts() {
        const container = document.getElementById('roundi-blog-container');

        try {
          const response = await fetch(API_URL);
          if (!response.ok) throw new Error('Failed to fetch blog posts');

          const data = await response.json();
          const posts = data.posts || data;
          const limitedPosts = posts.slice(0, MAX_POSTS);

          // Create grid HTML
          let gridHTML = '<div class="roundi-blog-grid">';

          limitedPosts.forEach(post => {
            gridHTML += `
              <a href="${BLOG_BASE_URL}/${post.slug}" class="roundi-blog-card" target="_blank" rel="noopener noreferrer">
                <img src="${post.image}" alt="${post.title}" class="roundi-blog-card-image" />
                <div class="roundi-blog-card-content">
                  <div class="roundi-blog-card-meta">
                    <span>${formatDate(post.date)}</span>
                    <span>•</span>
                    <span>${post.readTime} min read</span>
                  </div>
                  <h3 class="roundi-blog-card-title">${post.title}</h3>
                  ${post.subtitle ? `<p class="roundi-blog-card-excerpt">${post.subtitle}</p>` : ''}
                  <div class="roundi-blog-card-author">
                    <span class="roundi-blog-card-author-name">${post.author.name}</span>
                  </div>
                </div>
              </a>
            `;
          });

          gridHTML += '</div>';

          // Update container
          container.innerHTML = `
            <div class="roundi-blog-header">
              <h2 class="roundi-blog-title">Latest from our blog</h2>
              <p class="roundi-blog-subtitle">Insights, stories, and updates</p>
            </div>
            ${gridHTML}
          `;
        } catch (error) {
          container.innerHTML = `
            <div class="roundi-blog-header">
              <h2 class="roundi-blog-title">Latest from our blog</h2>
              <p class="roundi-blog-subtitle">Insights, stories, and updates</p>
            </div>
            <div class="roundi-blog-error">Failed to load blog posts. Please try again later.</div>
          `;
          console.error('Error loading blog posts:', error);
        }
      }

      // Load posts when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadBlogPosts);
      } else {
        loadBlogPosts();
      }
    })();
  </script>
</body>
</html>
