<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Posts</title>
  <style>
    @font-face {
      font-family: 'OpenRunde';
      src: url('https://your-domain.com/fonts/OpenRunde-Regular-BF64ee9c6978988.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'OpenRunde';
      src: url('https://your-domain.com/fonts/OpenRunde-Medium-BF64ee9c695513a.woff') format('woff');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'OpenRunde';
      src: url('https://your-domain.com/fonts/OpenRunde-Semibold-BF64ee9c69788f3.woff') format('woff');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'OpenRunde';
      src: url('https://your-domain.com/fonts/OpenRunde-Bold-BF64ee9c696534f.woff') format('woff');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'OpenRunde', system-ui, -apple-system, sans-serif;
      background: transparent;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .blog-container {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .blog-header {
      margin-bottom: 3rem;
    }

    .blog-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #1a1a1a;
    }

    .blog-subtitle {
      font-size: 1.125rem;
      color: #666;
    }

    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
    }

    .blog-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 0.625rem;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .blog-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
    }

    .blog-card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #f5f5f5;
    }

    .blog-card-content {
      padding: 1.5rem;
    }

    .blog-card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: #999;
      margin-bottom: 0.75rem;
    }

    .blog-card-meta-separator {
      width: 4px;
      height: 4px;
      background: #999;
      border-radius: 50%;
    }

    .blog-card-category {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin-bottom: 0.5rem;
    }

    .blog-card-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      line-height: 1.4;
    }

    .blog-card-excerpt {
      font-size: 0.875rem;
      color: #666;
      line-height: 1.6;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .blog-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 1rem;
      border-top: 1px solid #e5e5e5;
    }

    .blog-card-author {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .blog-card-avatar {
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      object-fit: cover;
    }

    .blog-card-author-info {
      display: flex;
      flex-direction: column;
    }

    .blog-card-author-name {
      font-size: 0.875rem;
      font-weight: 500;
    }

    .blog-card-author-title {
      font-size: 0.75rem;
      color: #999;
    }

    .blog-card-date {
      font-size: 0.75rem;
      color: #999;
    }

    .blog-card-read-time {
      font-size: 0.75rem;
      color: #999;
    }

    .loading {
      text-align: center;
      padding: 4rem 0;
      font-size: 1.125rem;
      color: #666;
    }

    .error {
      text-align: center;
      padding: 4rem 0;
      color: #e53e3e;
    }

    .empty {
      text-align: center;
      padding: 4rem 0;
      color: #666;
    }

    @media (max-width: 768px) {
      .blog-title {
        font-size: 2rem;
      }

      .blog-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="blog-container">
    <div class="blog-header">
      <h1 class="blog-title">Read our blog</h1>
      <p class="blog-subtitle">Discover insights, stories, and updates from our team</p>
    </div>

    <div id="blog-posts" class="blog-grid">
      <div class="loading">Loading blog posts...</div>
    </div>
  </div>

  <script>
    // Configuration - UPDATE THIS with your deployed URL
    const API_URL = 'http://localhost:3000/api/blog';
    const BLOG_BASE_URL = 'http://localhost:3000/blog';

    async function fetchBlogPosts() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json();

        if (data.success && data.posts.length > 0) {
          renderBlogPosts(data.posts);
        } else {
          document.getElementById('blog-posts').innerHTML =
            '<div class="empty">No blog posts available yet.</div>';
        }
      } catch (error) {
        console.error('Error fetching blog posts:', error);
        document.getElementById('blog-posts').innerHTML =
          '<div class="error">Failed to load blog posts. Please try again later.</div>';
      }
    }

    function renderBlogPosts(posts) {
      const container = document.getElementById('blog-posts');
      container.innerHTML = posts.map(post => `
        <a href="${BLOG_BASE_URL}/${post.slug}" class="blog-card" target="_blank">
          <img
            src="${post.image || '/placeholder.jpg'}"
            alt="${post.title}"
            class="blog-card-image"
            onerror="this.src='/placeholder.jpg'"
          />
          <div class="blog-card-content">
            <div class="blog-card-meta">
              <span>${post.date}</span>
              <span class="blog-card-meta-separator"></span>
              <span>${post.readTime} min read</span>
            </div>
            ${post.category ? `<span class="blog-card-category">${post.category}</span>` : ''}
            <h3 class="blog-card-title">${post.title}</h3>
            <p class="blog-card-excerpt">${post.excerpt}</p>
            <div class="blog-card-footer">
              <div class="blog-card-author">
                <img
                  src="${post.author.avatar || '/placeholder-user.jpg'}"
                  alt="${post.author.name}"
                  class="blog-card-avatar"
                  onerror="this.src='/placeholder-user.jpg'"
                />
                <div class="blog-card-author-info">
                  <span class="blog-card-author-name">${post.author.name}</span>
                  <span class="blog-card-author-title">${post.author.title}</span>
                </div>
              </div>
            </div>
          </div>
        </a>
      `).join('');
    }

    // Fetch posts on page load
    fetchBlogPosts();

    // Optional: Refresh posts every 5 minutes
    setInterval(fetchBlogPosts, 5 * 60 * 1000);
  </script>
</body>
</html>
