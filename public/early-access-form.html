<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Early Access Signup Form</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: transparent;
      padding: 0;
    }

    .form-container {
      width: 100%;
      max-width: 100%;
    }

    .early-access-form {
      background: white;
      border-radius: 10px;
      padding: 24px;
      border: 1px solid rgba(22, 35, 24, 0.1);
    }

    @media (min-width: 768px) {
      .early-access-form {
        padding: 32px;
      }
    }

    @media (min-width: 1024px) {
      .early-access-form {
        padding: 40px;
      }
    }

    .section {
      margin-bottom: 24px;
    }

    @media (min-width: 768px) {
      .section {
        margin-bottom: 32px;
      }
    }

    .section-title {
      color: #101828;
      font-size: 16px;
      letter-spacing: -0.3125px;
      margin-bottom: 24px;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      letter-spacing: -0.1504px;
      color: #000;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .required {
      color: #fb2c36;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      background: white;
      height: 48px;
      font-size: 14px;
      letter-spacing: -0.1504px;
      padding: 12px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      transition: all 0.15s;
      font-family: inherit;
    }

    .form-input::placeholder,
    .form-textarea::placeholder {
      color: #717182;
    }

    .form-input:hover,
    .form-textarea:hover {
      border-color: #d1d5db;
    }

    .form-input:focus,
    .form-textarea:focus {
      outline: none;
      border-color: #162318;
      box-shadow: 0 0 0 1px #162318;
    }

    .form-input.error,
    .form-textarea.error {
      border-color: #ef4444;
    }

    .form-input.error:focus,
    .form-textarea.error:focus {
      box-shadow: 0 0 0 1px #ef4444;
    }

    .form-textarea {
      min-height: 120px;
      resize: none;
      height: auto;
    }

    .error-message {
      color: #ef4444;
      font-size: 14px;
      margin-top: 4px;
    }

    .helper-text {
      font-size: 14px;
      color: #717182;
      letter-spacing: -0.1504px;
      margin-bottom: 8px;
    }

    .radio-group {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }

    @media (min-width: 640px) {
      .radio-group.business-types {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .radio-group.delivery-ranges {
      grid-template-columns: repeat(3, 1fr);
    }

    .radio-group.team-sizes {
      grid-template-columns: repeat(3, 1fr);
    }

    .radio-label {
      position: relative;
      display: flex;
      align-items: center;
      padding: 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      border: 2px solid #e5e7eb;
      background: white;
    }

    .radio-label:hover {
      border-color: #d1d5db;
    }

    .radio-label.selected {
      border-color: #162318;
      background: #f9fafb;
    }

    .radio-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .radio-button {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #d1d5dc;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .radio-label.selected .radio-button {
      border-color: #162318;
    }

    .radio-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #162318;
      display: none;
    }

    .radio-label.selected .radio-dot {
      display: block;
    }

    .radio-text {
      font-size: 14px;
      letter-spacing: -0.3008px;
      color: #364153;
    }

    .radio-label.simple {
      justify-content: center;
      padding: 16px;
    }

    .radio-label.simple .radio-button {
      display: none;
    }

    .submit-container {
      display: flex;
      justify-content: flex-start;
      padding-top: 16px;
    }

    .submit-button {
      background: #162318;
      color: white;
      border: none;
      border-radius: 9999px;
      padding: 12px 48px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
    }

    .submit-button:hover:not(:disabled) {
      background: #2a3d2e;
    }

    .submit-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      padding: 16px 24px;
      border-radius: 8px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 1000;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .toast.success {
      border-left: 4px solid #10b981;
    }

    .toast.error {
      border-left: 4px solid #ef4444;
    }

    .toast-message {
      font-size: 14px;
      color: #1f2937;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <form id="earlyAccessForm" class="early-access-form">
      <!-- Contact Information Section -->
      <div class="section">
        <h2 class="section-title">Contact Information</h2>

        <div class="form-group">
          <label for="fullName" class="form-label">
            Full Name<span class="required">*</span>
          </label>
          <input
            type="text"
            id="fullName"
            name="fullName"
            class="form-input"
            placeholder="Enter your full name"
          />
          <div id="fullNameError" class="error-message"></div>
        </div>

        <div class="form-group">
          <label for="businessName" class="form-label">
            Business Name<span class="required">*</span>
          </label>
          <input
            type="text"
            id="businessName"
            name="businessName"
            class="form-input"
            placeholder="Enter your business name"
          />
          <div id="businessNameError" class="error-message"></div>
        </div>

        <div class="form-group">
          <label for="businessEmail" class="form-label">
            Business Email<span class="required">*</span>
          </label>
          <input
            type="email"
            id="businessEmail"
            name="businessEmail"
            class="form-input"
            placeholder="your.email@business.com"
          />
          <div id="businessEmailError" class="error-message"></div>
        </div>

        <div class="form-group">
          <label for="phoneNumber" class="form-label">
            Phone Number<span class="required">*</span>
          </label>
          <input
            type="tel"
            id="phoneNumber"
            name="phoneNumber"
            class="form-input"
            placeholder="+1 (555) 000-0000"
          />
          <div id="phoneNumberError" class="error-message"></div>
        </div>
      </div>

      <!-- Business Details Section -->
      <div class="section">
        <h2 class="section-title">Business Details</h2>

        <div class="form-group">
          <label class="form-label">Business Type</label>
          <div class="radio-group business-types" id="businessTypeGroup">
            <label class="radio-label">
              <input type="radio" name="businessType" value="Online Store" class="radio-input" />
              <div class="radio-button"><div class="radio-dot"></div></div>
              <span class="radio-text">Online Store</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="businessType" value="Restaurant / Café" class="radio-input" />
              <div class="radio-button"><div class="radio-dot"></div></div>
              <span class="radio-text">Restaurant / Café</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="businessType" value="Bakery" class="radio-input" />
              <div class="radio-button"><div class="radio-dot"></div></div>
              <span class="radio-text">Bakery</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="businessType" value="Electronics / Mobile Shop" class="radio-input" />
              <div class="radio-button"><div class="radio-dot"></div></div>
              <span class="radio-text">Electronics / Mobile Shop</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="businessType" value="Courier / Logistics Company" class="radio-input" />
              <div class="radio-button"><div class="radio-dot"></div></div>
              <span class="radio-text">Courier / Logistics Company</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="businessType" value="Fashion / Clothing Store" class="radio-input" />
              <div class="radio-button"><div class="radio-dot"></div></div>
              <span class="radio-text">Fashion / Clothing Store</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="businessType" value="Bookstore / Stationery Shop" class="radio-input" />
              <div class="radio-button"><div class="radio-dot"></div></div>
              <span class="radio-text">Bookstore / Stationery Shop</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="businessType" value="Beauty / Cosmetics Shop" class="radio-input" />
              <div class="radio-button"><div class="radio-dot"></div></div>
              <span class="radio-text">Beauty / Cosmetics Shop</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="businessType" value="Hardware / Construction Supplies" class="radio-input" />
              <div class="radio-button"><div class="radio-dot"></div></div>
              <span class="radio-text">Hardware / Construction Supplies</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="businessType" value="Water Delivery Business" class="radio-input" />
              <div class="radio-button"><div class="radio-dot"></div></div>
              <span class="radio-text">Water Delivery Business</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="businessType" value="Alcohol / Beverages Distributor" class="radio-input" />
              <div class="radio-button"><div class="radio-dot"></div></div>
              <span class="radio-text">Alcohol / Beverages Distributor</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="businessType" value="Fresh Produce / Farmers\' Outlet" class="radio-input" />
              <div class="radio-button"><div class="radio-dot"></div></div>
              <span class="radio-text">Fresh Produce / Farmers' Outlet</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">
            Number of Deliveries per day<span class="required">*</span>
          </label>
          <div class="radio-group delivery-ranges" id="deliveriesGroup">
            <label class="radio-label simple">
              <input type="radio" name="deliveriesPerDay" value="1-5" class="radio-input" />
              <span class="radio-text">1-5</span>
            </label>
            <label class="radio-label simple">
              <input type="radio" name="deliveriesPerDay" value="6-9" class="radio-input" />
              <span class="radio-text">6-9</span>
            </label>
            <label class="radio-label simple">
              <input type="radio" name="deliveriesPerDay" value="10-15" class="radio-input" />
              <span class="radio-text">10-15</span>
            </label>
            <label class="radio-label simple">
              <input type="radio" name="deliveriesPerDay" value="10-30" class="radio-input" />
              <span class="radio-text">10-30</span>
            </label>
            <label class="radio-label simple">
              <input type="radio" name="deliveriesPerDay" value="31-50" class="radio-input" />
              <span class="radio-text">31-50</span>
            </label>
            <label class="radio-label simple">
              <input type="radio" name="deliveriesPerDay" value="51+" class="radio-input" />
              <span class="radio-text">51+</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">
            Delivery Team Size (Riders/Drivers)<span class="required">*</span>
          </label>
          <div class="radio-group team-sizes" id="teamSizeGroup">
            <label class="radio-label simple">
              <input type="radio" name="deliveryTeamSize" value="0" class="radio-input" />
              <span class="radio-text">0</span>
            </label>
            <label class="radio-label simple">
              <input type="radio" name="deliveryTeamSize" value="1-2" class="radio-input" />
              <span class="radio-text">1-2</span>
            </label>
            <label class="radio-label simple">
              <input type="radio" name="deliveryTeamSize" value="3-5" class="radio-input" />
              <span class="radio-text">3-5</span>
            </label>
            <label class="radio-label simple">
              <input type="radio" name="deliveryTeamSize" value="6-10" class="radio-input" />
              <span class="radio-text">6-10</span>
            </label>
            <label class="radio-label simple">
              <input type="radio" name="deliveryTeamSize" value="11+" class="radio-input" />
              <span class="radio-text">11+</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Additional Information Section -->
      <div class="section">
        <h2 class="section-title">Additional Information</h2>

        <div class="form-group">
          <label for="biggestChallenge" class="form-label">
            Biggest Delivery Challenge
          </label>
          <p class="helper-text">
            Example: High costs, Late deliveries, Customer complaints, etc.
          </p>
          <textarea
            id="biggestChallenge"
            name="biggestChallenge"
            class="form-textarea"
            placeholder="Tell us about your biggest delivery challenges..."
          ></textarea>
        </div>
      </div>

      <div class="submit-container">
        <button type="submit" class="submit-button" id="submitBtn">
          Submit
        </button>
      </div>
    </form>
  </div>

  <script>
    (function() {
      // ========================================
      // MAILERLITE CONFIGURATION
      // ========================================
      // IMPORTANT: For security, use a backend/serverless function instead of exposing your API key
      // This is a simple implementation - see instructions below for secure setup

      const MAILERLITE_CONFIG = {
        // Option 1: Direct API (NOT RECOMMENDED - exposes API key)
        // apiKey: 'YOUR_MAILERLITE_API_KEY', // Get from: https://dashboard.mailerlite.com/integrations/api
        // groupId: 'YOUR_GROUP_ID', // Get from: Groups section in MailerLite

        // Option 2: Use serverless function (RECOMMENDED)
        useServerless: true, // Set to true to use serverless function
        serverlessEndpoint: '/api/subscribe' // Your serverless function URL
      };

      const form = document.getElementById('earlyAccessForm');
      const submitBtn = document.getElementById('submitBtn');

      // Radio button selection handling
      const radioLabels = document.querySelectorAll('.radio-label');
      radioLabels.forEach(label => {
        const input = label.querySelector('.radio-input');
        input.addEventListener('change', function() {
          // Remove selected class from all labels in the same group
          const groupName = this.name;
          document.querySelectorAll(`input[name="${groupName}"]`).forEach(radio => {
            radio.closest('.radio-label').classList.remove('selected');
          });
          // Add selected class to current label
          if (this.checked) {
            label.classList.add('selected');
          }
        });
      });

      // Clear error on input
      const inputs = form.querySelectorAll('.form-input, .form-textarea');
      inputs.forEach(input => {
        input.addEventListener('input', function() {
          this.classList.remove('error');
          const errorElement = document.getElementById(this.id + 'Error');
          if (errorElement) {
            errorElement.textContent = '';
          }
        });
      });

      // Toast notification
      function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<div class="toast-message">${message}</div>`;
        document.body.appendChild(toast);

        setTimeout(() => {
          toast.style.opacity = '0';
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      // Form validation
      function validateForm() {
        let isValid = true;
        const errors = {};

        const fullName = document.getElementById('fullName').value.trim();
        if (!fullName) {
          errors.fullName = 'Full name is required';
          isValid = false;
        }

        const businessName = document.getElementById('businessName').value.trim();
        if (!businessName) {
          errors.businessName = 'Business name is required';
          isValid = false;
        }

        const businessEmail = document.getElementById('businessEmail').value.trim();
        if (!businessEmail) {
          errors.businessEmail = 'Business email is required';
          isValid = false;
        } else {
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailRegex.test(businessEmail)) {
            errors.businessEmail = 'Please enter a valid email address';
            isValid = false;
          }
        }

        const phoneNumber = document.getElementById('phoneNumber').value.trim();
        if (!phoneNumber) {
          errors.phoneNumber = 'Phone number is required';
          isValid = false;
        }

        // Display errors
        Object.keys(errors).forEach(field => {
          const input = document.getElementById(field);
          const errorElement = document.getElementById(field + 'Error');
          if (input && errorElement) {
            input.classList.add('error');
            errorElement.textContent = errors[field];
          }
        });

        return isValid;
      }

      // Form submission
      form.addEventListener('submit', async function(e) {
        e.preventDefault();

        if (!validateForm()) {
          showToast('Please fix the errors in the form', 'error');
          return;
        }

        // Disable submit button
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<div class="spinner"></div>Submitting...';

        // Collect form data
        const formData = {
          fullName: document.getElementById('fullName').value,
          businessName: document.getElementById('businessName').value,
          businessEmail: document.getElementById('businessEmail').value,
          phoneNumber: document.getElementById('phoneNumber').value,
          businessType: document.querySelector('input[name="businessType"]:checked')?.value || '',
          deliveriesPerDay: document.querySelector('input[name="deliveriesPerDay"]:checked')?.value || '',
          deliveryTeamSize: document.querySelector('input[name="deliveryTeamSize"]:checked')?.value || '',
          biggestChallenge: document.getElementById('biggestChallenge').value
        };

        // Send to MailerLite
        try {
          if (MAILERLITE_CONFIG.useServerless) {
            // Option 2: Send via serverless function (RECOMMENDED)
            const response = await fetch(MAILERLITE_CONFIG.serverlessEndpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(formData)
            });

            if (!response.ok) {
              throw new Error('Subscription failed');
            }
          } else {
            // Option 1: Direct MailerLite API call
            const response = await fetch('https://connect.mailerlite.com/api/subscribers', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${MAILERLITE_CONFIG.apiKey}`
              },
              body: JSON.stringify({
                email: formData.businessEmail,
                fields: {
                  name: formData.fullName,
                  company: formData.businessName,
                  phone: formData.phoneNumber
                },
                groups: [MAILERLITE_CONFIG.groupId],
                // Store additional data in custom fields (you'll need to create these in MailerLite)
                // Or you can add them as tags/notes
                status: 'active'
              })
            });

            if (!response.ok) {
              const errorData = await response.json();
              console.error('MailerLite error:', errorData);
              throw new Error('Subscription failed');
            }

            // Optionally, log the additional form data
            console.log('Additional form data:', {
              businessType: formData.businessType,
              deliveriesPerDay: formData.deliveriesPerDay,
              deliveryTeamSize: formData.deliveryTeamSize,
              biggestChallenge: formData.biggestChallenge
            });
          }

          showToast('Thank you for signing up! We\'ll be in touch soon.', 'success');

          // Reset form
          form.reset();
          radioLabels.forEach(label => label.classList.remove('selected'));
        } catch (error) {
          console.error('Error:', error);
          showToast('Something went wrong. Please try again.', 'error');
        } finally {
          // Re-enable submit button
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Submit';
        }
      });
    })();
  </script>
</body>
</html>
